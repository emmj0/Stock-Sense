name: Refresh learning content (weekly)

# Regenerates course reading/quizzes via Gemini once a week, in place.
# Course ids, quiz ids/count, and videos are preserved, so user progress is never broken.

on:
  schedule:
    - cron: '0 3 * * 1' # every Monday 03:00 UTC
  workflow_dispatch: {}    # allow manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Refresh courses with Gemini
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }} # optional override, defaults to gemini-1.5-flash
        run: node src/scripts/refresh-courses.js
