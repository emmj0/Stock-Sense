name: Daily AI Predictions

on:
  schedule:
    # Run Mon-Fri at 12:00 UTC = 5:00 PM PKT (after PSX close at 3:30 PM)
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-model-${{ hashFiles('model/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-model-

      - name: Install dependencies
        working-directory: ./model
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Prediction Pipeline
        working-directory: ./model
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: ${{ secrets.DB_NAME }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_1 }}
          TAVILY_API_KEY_1: ${{ secrets.TAVILY_API_KEY_1 }}
          TAVILY_API_KEY_2: ${{ secrets.TAVILY_API_KEY_2 }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY_1 }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          python run_predictions.py 2>&1 | tail -100

      - name: Print Summary
        if: always()
        run: echo "Prediction pipeline completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
