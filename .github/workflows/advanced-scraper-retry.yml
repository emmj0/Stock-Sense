
name: Advanced Daily PSX Scrapers

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip xvfb libxi6 libnss3 libxss1 libatk-bridge2.0-0 libgtk-3-0 libgbm1

          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      - name: Remove old chromedriver
        run: |
          sudo rm -f /usr/bin/chromedriver

      - name: Install Python Dependencies
        working-directory: ./Scrapper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install selenium

      - name: Run Index Scraper
        working-directory: ./Scrapper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python Index.py

      - name: Run Market Scraper
        working-directory: ./Scrapper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python ChromeScrapper.py

      - name: Run Sector Scraper
        working-directory: ./Scrapper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python sector.py
