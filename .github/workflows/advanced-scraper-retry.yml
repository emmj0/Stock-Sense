name: Advanced Daily PSX Scrapers (with Retry)

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:

  scrape-indices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            libnss3 \
            libxss1 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            xvfb

          sudo ln -sf /usr/bin/chromium-browser /usr/bin/google-chrome
          sudo ln -sf /usr/bin/chromedriver /usr/bin/chromedriver

      - name: Install Python dependencies
        working-directory: ./Scrapper
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Index Scraper
        working-directory: ./Scrapper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python Index.py


  scrape-market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            libnss3 \
            libxss1 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            xvfb

          sudo ln -sf /usr/bin/chromium-browser /usr/bin/google-chrome
          sudo ln -sf /usr/bin/chromedriver /usr/bin/chromedriver

      - name: Install Python dependencies
        working-directory: ./Scrapper
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Scraper
        working-directory: ./Scrapper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python ChromeScrapper.py


  scrape-sectors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            libnss3 \
            libxss1 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            xvfb

          sudo ln -sf /usr/bin/chromium-browser /usr/bin/google-chrome
          sudo ln -sf /usr/bin/chromedriver /usr/bin/chromedriver

      - name: Install Python dependencies
        working-directory: ./Scrapper
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sector Scraper
        working-directory: ./Scrapper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python sector.py
